<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile – Campus Hub</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<main class="page-content">
  <div class="animate-in" style="max-width:700px">
    <div class="page-header">
      <h1>👤 My Profile</h1>
    </div>

    <!-- Profile card -->
    <div class="card mb-2">
      <div class="card-body" style="display:flex;gap:1.5rem;align-items:flex-start;flex-wrap:wrap">
        <div style="width:80px;height:80px;border-radius:50%;background:var(--navy);display:flex;align-items:center;justify-content:center;color:var(--gold);font-size:2rem;font-weight:700;flex-shrink:0" id="avatar-circle">?</div>
        <div style="flex:1">
          <h2 id="profile-name">Loading...</h2>
          <p class="text-muted" id="profile-username"></p>
          <p class="text-muted" id="profile-email"></p>
          <div style="display:flex;gap:1rem;margin-top:0.75rem;flex-wrap:wrap">
            <div class="points-display" style="padding:0.75rem 1.25rem;border-radius:8px;display:inline-block">
              <div style="font-size:1.5rem;font-weight:900" id="profile-points">0</div>
              <div style="font-size:0.75rem">Engagement Points</div>
            </div>
            <div style="background:var(--light-bg);padding:0.75rem 1.25rem;border-radius:8px">
              <div style="font-weight:700" id="profile-role"></div>
              <div style="font-size:0.75rem;color:var(--text-light)">Account Role</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Edit form -->
    <div class="card">
      <div class="card-header"><h3>✏ Edit Profile</h3></div>
      <div class="card-body">
        <div id="profile-alert"></div>
        <div class="form-row">
          <div class="form-group">
            <label>First Name</label>
            <input type="text" id="edit-first" class="form-control">
          </div>
          <div class="form-group">
            <label>Last Name</label>
            <input type="text" id="edit-last" class="form-control">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Student ID</label>
            <input type="text" id="edit-sid" class="form-control" readonly style="background:var(--light-bg)">
          </div>
          <div class="form-group">
            <label>Course</label>
            <input type="text" id="edit-course" class="form-control">
          </div>
        </div>
        <div class="form-group">
          <label>Email (read-only)</label>
          <input type="email" id="edit-email" class="form-control" readonly style="background:var(--light-bg)">
        </div>
        <button class="btn btn-primary" onclick="saveProfile()">Save Changes</button>
      </div>
    </div>
  </div>
</main>

<script src="../js/app.js"></script>
<script src="../js/layout.js"></script>
<script>
  if (!Auth.requireLogin()) throw new Error();
  renderLayout('profile');

  async function loadProfile() {
    try {
      const p = await Http.get('/auth/profile');
      document.getElementById('profile-name').textContent = `${p.firstName || ''} ${p.lastName || ''}`.trim() || p.username;
      document.getElementById('profile-username').textContent = '@' + p.username;
      document.getElementById('profile-email').textContent = p.email;
      document.getElementById('profile-points').textContent = p.engagementPoints || 0;
      document.getElementById('profile-role').textContent = p.role === 'ROLE_ADMIN' ? '⚙ Administrator' : '🎓 Student';
      document.getElementById('avatar-circle').textContent = (p.firstName || p.username || '?').charAt(0).toUpperCase();

      document.getElementById('edit-first').value = p.firstName || '';
      document.getElementById('edit-last').value = p.lastName || '';
      document.getElementById('edit-sid').value = p.studentId || '';
      document.getElementById('edit-course').value = p.course || '';
      document.getElementById('edit-email').value = p.email || '';
    } catch (e) {
      document.getElementById('profile-name').textContent = 'Error loading profile';
    }
  }

  async function saveProfile() {
    const alertEl = document.getElementById('profile-alert');
    try {
      await Http.put('/auth/profile', {
        firstName: document.getElementById('edit-first').value,
        lastName: document.getElementById('edit-last').value,
        course: document.getElementById('edit-course').value
      });
      alertEl.innerHTML = '<div class="alert alert-success">Profile updated successfully.</div>';
      loadProfile();
      setTimeout(() => alertEl.innerHTML = '', 3000);
    } catch (e) {
      alertEl.innerHTML = `<div class="alert alert-danger">${e.message}</div>`;
    }
  }

  loadProfile();
</script>
</body>
</html>
