<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel – Campus Hub</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<main class="page-content">
  <div class="animate-in">
    <div class="page-header">
      <h1>⚙ Admin Panel</h1>
      <p class="text-muted">University of Wolverhampton – Campus Hub Administration</p>
    </div>

    <!-- Stats — Phase 1: 4 cards -->
    <div class="stat-grid mb-2" id="admin-stats">
      <div class="stat-card">
        <div class="stat-number">–</div>
        <div class="stat-label">Total Students</div>
      </div>
      <div class="stat-card" style="border-color:var(--info)">
        <div class="stat-number">–</div>
        <div class="stat-label">Total Clubs</div>
      </div>
      <div class="stat-card" style="border-color:var(--success)">
        <div class="stat-number">–</div>
        <div class="stat-label">Total Events</div>
      </div>
      <div class="stat-card" style="border-color:var(--warning)">
        <div class="stat-number">–</div>
        <div class="stat-label">Announcements</div>
      </div>
    </div>

    <!-- Admin Quick Nav — Phase 1 features only -->
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1rem;margin-bottom:1.5rem">
      <a href="events.html" class="card" style="text-decoration:none;padding:1.25rem;display:flex;align-items:center;gap:0.75rem">
        <span style="font-size:1.5rem">📅</span>
        <div><strong>Events</strong><br><span class="text-muted" style="font-size:0.8rem">Create &amp; manage events</span></div>
      </a>
      <a href="announcements.html" class="card" style="text-decoration:none;padding:1.25rem;display:flex;align-items:center;gap:0.75rem">
        <span style="font-size:1.5rem">📢</span>
        <div><strong>Announcements</strong><br><span class="text-muted" style="font-size:0.8rem">Post university news</span></div>
      </a>
      <a href="clubs.html" class="card" style="text-decoration:none;padding:1.25rem;display:flex;align-items:center;gap:0.75rem">
        <span style="font-size:1.5rem">🎓</span>
        <div><strong>Clubs</strong><br><span class="text-muted" style="font-size:0.8rem">Manage student clubs</span></div>
      </a>
    </div>

    <!-- Users table -->
    <div class="card">
      <div class="card-header"><h3>👥 Registered Users</h3></div>
      <div class="card-body" id="users-container">
        <div class="loading-overlay"><div class="loading-spinner"></div></div>
      </div>
    </div>

  </div>
</main>

<script src="../js/app.js"></script>
<script src="../js/layout.js"></script>
<script>
  if (!Auth.requireAdmin()) throw new Error();
  renderLayout('admin');

  async function loadStats() {
    try {
      const stats = await Http.get('/admin/stats');
      const cards = document.querySelectorAll('#admin-stats .stat-card .stat-number');
      cards[0].textContent = stats.totalStudents;
      cards[1].textContent = stats.totalClubs;
      cards[2].textContent = stats.totalEvents;
      cards[3].textContent = stats.totalAnnouncements;
    } catch {}
  }

  async function loadUsers() {
    const cont = document.getElementById('users-container');
    try {
      const users = await Http.get('/admin/users');
      if (!users.length) { Utils.empty(cont, 'No users yet.'); return; }
      cont.innerHTML = `
        <div class="table-wrap">
          <table class="data-table">
            <thead>
              <tr>
                <th>Name</th>
                <th>Username</th>
                <th>Email</th>
                <th>Student ID</th>
                <th>Course</th>
                <th>Role</th>
                <th>Joined</th>
                <th></th>
              </tr>
            </thead>
            <tbody>
              ${users.map(u => `
                <tr>
                  <td>${Utils.escape(u.firstName || '')} ${Utils.escape(u.lastName || '')}</td>
                  <td>${Utils.escape(u.username)}</td>
                  <td>${Utils.escape(u.email)}</td>
                  <td>${Utils.escape(u.studentId || '–')}</td>
                  <td>${Utils.escape(u.course || '–')}</td>
                  <td><span class="badge ${u.role === 'ROLE_ADMIN' ? 'badge-warning' : 'badge-info'}">${u.role === 'ROLE_ADMIN' ? 'Admin' : 'Student'}</span></td>
                  <td>${Utils.formatDate(u.createdAt)}</td>
                  <td>
                    ${u.role !== 'ROLE_ADMIN' ? `
                    <button class="btn btn-danger btn-sm" onclick="deleteUser(${u.id}, '${Utils.escape(u.username)}')">Delete</button>` : ''}
                  </td>
                </tr>`).join('')}
            </tbody>
          </table>
        </div>`;
    } catch (e) {
      cont.innerHTML = '<p class="text-muted">Could not load users.</p>';
    }
  }

  async function deleteUser(id, username) {
    const confirmed = await showConfirm({
      title: 'Delete User',
      message: `Are you sure you want to delete <strong>${username}</strong>? This cannot be undone.`,
      confirmText: 'Delete',
      type: 'danger'
    });
    if (!confirmed) return;
    try {
      await Http.delete(`/admin/users/${id}`);
      showToast('User deleted', `${username} has been removed.`, 'success');
      loadUsers();
      loadStats();
    } catch {
      showToast('Error', 'Could not delete user.', 'error');
    }
  }

  loadStats();
  loadUsers();
</script>
</body>
</html>
