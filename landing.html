<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campus Hub – University of Wolverhampton</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --navy: #0d1b3e;
    --navy2: #111d3f;
    --navy3: #162044;
    --amber: #f5a623;
    --amber2: #e09010;
    --white: #ffffff;
    --muted: rgba(255,255,255,0.55);
    --border: rgba(255,255,255,0.1);
  }

  html, body { height: 100%; }

  body {
    font-family: 'Sora', sans-serif;
    background: var(--navy);
    color: var(--white);
    overflow-x: hidden;
  }

  /* ── Diamond decorations ── */
  .deco {
    position: absolute;
    border: 2px solid rgba(255,255,255,0.07);
    transform: rotate(45deg);
    border-radius: 6px;
    background: rgba(255,255,255,0.02);
  }

  /* ── Hero ── */
  .hero {
    position: relative;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2rem;
    overflow: hidden;
  }

  .hero .deco-1 { width:200px; height:200px; top:8%; left:3%; animation: float 8s ease-in-out infinite; }
  .hero .deco-2 { width:120px; height:120px; top:55%; left:1%; animation: float 10s ease-in-out infinite reverse; }
  .hero .deco-3 { width:160px; height:160px; top:5%;  right:4%; animation: float 9s ease-in-out infinite 1s; }
  .hero .deco-4 { width:220px; height:220px; bottom:5%; right:2%; animation: float 11s ease-in-out infinite 2s; }
  .hero .deco-5 { width: 90px; height: 90px; bottom:18%; left:12%; animation: float 7s ease-in-out infinite 0.5s; }

  @keyframes float {
    0%,100% { transform: rotate(45deg) translateY(0); }
    50%      { transform: rotate(45deg) translateY(-18px); }
  }

  /* Logo */
  .logo-wrap {
    position: absolute;
    top: 2.5rem; right: 3rem;
    display: flex; align-items: center; gap: 0.8rem;
  }
  .logo-img { width: 52px; height: 52px; object-fit: contain; }

  /* Badge */
  .badge {
    display: inline-flex; align-items: center; gap: 0.5rem;
    border: 1px solid var(--border);
    border-radius: 50px;
    padding: 0.4rem 1.2rem;
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 2rem;
    backdrop-filter: blur(4px);
    background: rgba(255,255,255,0.04);
  }
  .badge-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--amber);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { opacity:1; transform:scale(1); }
    50%      { opacity:0.5; transform:scale(0.7); }
  }

  h1 {
    font-size: clamp(3rem, 8vw, 5.5rem);
    font-weight: 800;
    line-height: 1.05;
    letter-spacing: -0.02em;
    margin-bottom: 1.5rem;
  }
  h1 span { color: var(--amber); }

  .subtitle {
    font-family: 'Inter', sans-serif;
    font-size: clamp(0.9rem, 2vw, 1.05rem);
    color: var(--muted);
    max-width: 500px;
    line-height: 1.7;
    margin-bottom: 3rem;
  }

  /* CTA buttons */
  .cta-group { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; margin-bottom: 4rem; }

  .btn-primary {
    background: var(--amber);
    color: #1a1000;
    border: none;
    padding: 0.85rem 2.2rem;
    border-radius: 8px;
    font-family: 'Sora', sans-serif;
    font-weight: 700;
    font-size: 0.95rem;
    cursor: pointer;
    text-decoration: none;
    transition: background 0.2s, transform 0.2s;
  }
  .btn-primary:hover { background: #ffb733; transform: translateY(-2px); }

  .btn-outline {
    background: transparent;
    color: var(--white);
    border: 1.5px solid rgba(255,255,255,0.3);
    padding: 0.85rem 2.2rem;
    border-radius: 8px;
    font-family: 'Sora', sans-serif;
    font-weight: 600;
    font-size: 0.95rem;
    cursor: pointer;
    text-decoration: none;
    transition: border-color 0.2s, transform 0.2s, background 0.2s;
    display: flex; align-items: center; gap: 0.5rem;
  }
  .btn-outline:hover { border-color: var(--white); background: rgba(255,255,255,0.06); transform: translateY(-2px); }
  .btn-outline svg { transition: transform 0.2s; }
  .btn-outline:hover svg { transform: translateX(4px); }

  /* Divider */
  .divider {
    width: min(500px, 80vw);
    height: 1px;
    background: rgba(255,255,255,0.12);
    margin: 0 auto 3rem;
  }

  /* Stats */
  .stats { display: flex; gap: 3rem; justify-content: center; flex-wrap: wrap; }
  .stat { text-align: center; }
  .stat-number { font-size: 2rem; font-weight: 800; color: var(--white); }
  .stat-label { font-size: 0.78rem; color: var(--muted); font-family: 'Inter', sans-serif; margin-top: 0.2rem; }

  /* Entrance animation */
  .hero-content { animation: fadeUp 0.8s cubic-bezier(0.22,1,0.36,1) both; }
  @keyframes fadeUp {
    from { opacity:0; transform: translateY(30px); }
    to   { opacity:1; transform: translateY(0); }
  }
</style>
</head>
<body>

<section class="hero">
  <!-- Decorative diamonds -->
  <div class="deco deco-1"></div>
  <div class="deco deco-2"></div>
  <div class="deco deco-3"></div>
  <div class="deco deco-4"></div>
  <div class="deco deco-5"></div>

  <!-- Logo top-right -->
  <div class="logo-wrap">
    <img src="logo.png" alt="University of Wolverhampton" class="logo-img">
  </div>

  <div class="hero-content">
    <div class="badge">
      <span class="badge-dot"></span>
      The University of Opportunity
    </div>

    <h1>Campus <span>Hub</span></h1>

    <p class="subtitle">
      University of Wolverhampton central platform for student services,
      events, clubs, facilities and wellbeing support.
    </p>

    <div class="cta-group">
      <a href="signin.html" class="btn-primary">Sign In</a>
      <a href="register.html" class="btn-outline">
        Register
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </a>
    </div>

    <div class="divider"></div>

    <div class="stats">
      <div class="stat">
        <div class="stat-number">23,000+</div>
        <div class="stat-label">Students</div>
      </div>
      <div class="stat">
        <div class="stat-number">50+</div>
        <div class="stat-label">Clubs</div>
      </div>
      <div class="stat">
        <div class="stat-number">3</div>
        <div class="stat-label">Campuses</div>
      </div>
    </div>
  </div>
</section>

</body>
</html>
