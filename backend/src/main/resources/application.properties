server.port=8080

# --- Database ---
# Marcus set up MySQL locally with these defaults. Change to match your own setup.
# The createDatabaseIfNotExist flag means you don't have to manually create the schema.
spring.datasource.url=jdbc:mysql://localhost:3306/campus_hub?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ddl-auto=update lets Hibernate create/alter tables on startup — fine for dev,
# would switch to validate (or use Flyway) in production
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# --- JWT ---
# Secret needs to be at least 256 bits for HS256. This one works but should be
# moved to an env variable before any actual deployment.
app.jwt.secret=wolverhampton_campus_hub_secret_key_2024_very_long_secure_string
app.jwt.expiration=86400000

# --- Logging ---
logging.level.com.wolverhampton=DEBUG
logging.level.org.springframework.security=INFO
