# ─── Test Database (H2 in-memory) ─────────────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:campushub_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# ─── JWT ──────────────────────────────────────────────────────────────────────
app.jwt.secret=wolverhampton_campus_hub_secret_key_2024_very_long_secure_string
app.jwt.expiration=86400000

# ─── Logging ──────────────────────────────────────────────────────────────────
logging.level.com.wolverhampton=WARN
logging.level.org.springframework.security=WARN
